<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Lịch Dashboard PRO</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  display: flex;
  height: 100vh;
  background: linear-gradient(135deg,#1e3c72,#2a5298);
  color: white;
}

/* ===== LAYOUT ===== */
.wrapper {
  display: flex;
  width: 100%;
  padding: 20px;
  gap: 20px;
}

/* ===== LEFT ===== */
.left {
  width: 420px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(20px);
  padding: 20px;
  border-radius: 16px;
}

/* ===== RIGHT ===== */
.right {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(15px);
  padding: 15px;
  border-radius: 16px;
}

/* ===== ELEMENT ===== */
h2,h3 {text-align:center;margin:5px 0;}
button {
  padding:6px 10px;
  border:none;
  border-radius:8px;
  background:rgba(255,255,255,0.2);
  color:white;
  cursor:pointer;
}
button:hover {background:rgba(255,255,255,0.4);}
input {padding:6px;margin:3px;border-radius:6px;border:none;}

ul {list-style:none;padding:0;}
li {
  background:rgba(255,255,255,0.2);
  margin:5px 0;
  padding:8px;
  display:flex;
  justify-content:space-between;
}

/* ===== CALENDAR ===== */
.calendar {
  display:grid;
  grid-template-columns: repeat(7,1fr);
  gap:5px;
  text-align:center;
}

.day {
  padding:8px;
  background:rgba(255,255,255,0.2);
  border-radius:6px;
}

.today {
  background:#ff4081;
}
</style>
</head>

<body>

<div class="wrapper">

<!-- ===== LEFT ===== -->
<div class="left">

<h2 id="solar"></h2>
<h3 id="lunar"></h3>

<div style="display:flex;justify-content:space-between;">
<button onclick="changeDate(-1)">⬅</button>
<button onclick="changeDate(1)">➡</button>
</div>

<div>
<input type="text" id="taskInput" placeholder="Nhập công việc...">
<button onclick="addTask()">Thêm</button>
</div>

<ul id="taskList"></ul>

<button onclick="toggleMode()" id="modeBtn">Tra cứu dương → âm</button>

<div id="solarMode">
<input type="date" id="datePicker" onchange="convertSelectedDate()">
<h3 id="resultLunar"></h3>
</div>

<div id="lunarMode" style="display:none;">
<input id="lDay" placeholder="Ngày">
<input id="lMonth" placeholder="Tháng">
<input id="lYear" placeholder="Năm">
<button onclick="convertLunarToSolar()">Chuyển</button>
<h3 id="resultSolar"></h3>
</div>

</div>

<!-- ===== RIGHT ===== -->
<div class="right">

<!-- CALENDAR -->
<div class="card">
<h3>📅 Lịch tháng</h3>
<div id="calendar" class="calendar"></div>
</div>

<!-- STATS -->
<div class="card">
<h3>📊 Thống kê</h3>
<p id="taskCount"></p>
</div>

<!-- NOTE -->
<div class="card">
<h3>📝 Ghi chú</h3>
<textarea id="note" style="width:100%;height:80px;"></textarea>
</div>

</div>

</div>

<script>
let currentDate = new Date();
let isSolarMode = true;

/* ===== TIME ===== */
function updateTime(){
  solar.innerText = new Date().toLocaleTimeString("vi-VN") + " - " +
  currentDate.toLocaleDateString("vi-VN",{weekday:'long',year:'numeric',month:'long',day:'numeric'});
}

/* ===== FAKE LUNAR (giữ logic cũ của bạn có thể thay lại) ===== */
function convertSolar2Lunar(d,m,y){
  return {day:d,month:m,year:y};
}

/* ===== RENDER ===== */
function render(){
  updateTime();

  const lunarDate = convertSolar2Lunar(
    currentDate.getDate(),
    currentDate.getMonth()+1,
    currentDate.getFullYear()
  );

  lunar.innerText = `Âm: ${lunarDate.day}/${lunarDate.month}/${lunarDate.year}`;

  renderTasks();
  renderCalendar();
}

/* ===== CALENDAR ===== */
function renderCalendar(){
  const cal = document.getElementById("calendar");
  cal.innerHTML = "";

  const year = currentDate.getFullYear();
  const month = currentDate.getMonth();

  const lastDay = new Date(year, month+1, 0).getDate();

  for(let i=1;i<=lastDay;i++){
    const div = document.createElement("div");
    div.className = "day";

    if(i === currentDate.getDate()) div.classList.add("today");

    div.innerText = i;
    cal.appendChild(div);
  }
}

/* ===== TOGGLE ===== */
function toggleMode(){
  isSolarMode = !isSolarMode;
  solarMode.style.display = isSolarMode?"block":"none";
  lunarMode.style.display = isSolarMode?"none":"block";
}

/* ===== TASK ===== */
function formatDate(d){return d.toISOString().split('T')[0];}
function getTasks(){return JSON.parse(localStorage.getItem(formatDate(currentDate)))||[];}
function saveTasks(t){localStorage.setItem(formatDate(currentDate),JSON.stringify(t));}

function renderTasks(){
  const list = getTasks();
  taskList.innerHTML="";
  list.forEach((t,i)=>{
    taskList.innerHTML+=`<li>${t}<span onclick="deleteTask(${i})">❌</span></li>`;
  });

  taskCount.innerText = "Tổng công việc: " + list.length;
}

function addTask(){
  if(!taskInput.value.trim())return;
  let t = getTasks();
  t.push(taskInput.value);
  saveTasks(t);
  taskInput.value="";
  renderTasks();
}

function deleteTask(i){
  let t=getTasks();
  t.splice(i,1);
  saveTasks(t);
  renderTasks();
}

/* ===== CHANGE DATE ===== */
function changeDate(d){
  currentDate.setDate(currentDate.getDate()+d);
  render();
}

/* ===== INIT ===== */
setInterval(updateTime,1000);
render();
</script>

</body>
</html>
