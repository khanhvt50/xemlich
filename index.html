<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Lịch Hằng Ngày</title>

  <style>
    body {
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-size: cover;
      background-position: center;
      transition: background 0.5s ease;
    }

    .container {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(10px);
      padding: 20px;
      width: 400px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    h2, h3 {
      text-align: center;
      margin: 5px 0;
    }

    .lunar {
      color: #e91e63;
      font-weight: bold;
    }

    .nav {
      display: flex;
      justify-content: space-between;
      margin-bottom: 15px;
    }

    button {
      padding: 5px 10px;
      cursor: pointer;
    }

    input {
      width: 75%;
      padding: 5px;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      background: #e3f2fd;
      margin: 5px 0;
      padding: 8px;
      display: flex;
      justify-content: space-between;
      border-radius: 5px;
    }

    .delete {
      color: red;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="container">
  <h2 id="solar"></h2>
  <h3 id="lunar" class="lunar"></h3>

  <div class="nav">
    <button onclick="changeDate(-1)">⬅</button>
    <button onclick="changeDate(1)">➡</button>
  </div>

  <div>
    <input type="text" id="taskInput" placeholder="Nhập công việc...">
    <button onclick="addTask()">Thêm</button>
  </div>

  <ul id="taskList"></ul>
</div>

<script>
let currentDate = new Date();

// ===== 🌄 BACKGROUND THEO NGÀY =====
const backgrounds = [
  "https://images.unsplash.com/photo-1501785888041-af3ef285b470",
  "https://images.unsplash.com/photo-1507525428034-b723cf961d3e",
  "https://images.unsplash.com/photo-1490750967868-88aa4486c946",
  "https://images.unsplash.com/photo-1465101046530-73398c7f28ca",
  "https://images.unsplash.com/photo-1500530855697-b586d89ba3ee"
];

// lấy ngày trong năm
function getDayOfYear() {
  const now = new Date();
  const start = new Date(now.getFullYear(), 0, 0);
  return Math.floor((now - start) / (1000 * 60 * 60 * 24));
}

// set background
function setBackground() {
  const index = getDayOfYear() % backgrounds.length;
  document.body.style.backgroundImage = `url('${backgrounds[index]}')`;
}

// ======= LỊCH ÂM =======
function getLunarDate(date) {
  const lunar = new Date(date);
  lunar.setDate(lunar.getDate() - 10);
  return {
    day: lunar.getDate(),
    month: lunar.getMonth() + 1,
    year: lunar.getFullYear()
  };
}

// ======= FORMAT =======
function formatDate(date) {
  return date.toISOString().split('T')[0];
}

// ======= RENDER =======
function renderDate() {
  const solarEl = document.getElementById("solar");
  const lunarEl = document.getElementById("lunar");

  solarEl.innerText =
    currentDate.toLocaleDateString("vi-VN", {
      weekday: 'long',
      year: 'numeric',
      month: 'long',
      day: 'numeric'
    });

  const lunar = getLunarDate(currentDate);
  lunarEl.innerText = `Âm lịch: ${lunar.day}/${lunar.month}/${lunar.year}`;

  renderTasks();
}

// ======= ĐỔI NGÀY =======
function changeDate(days) {
  currentDate.setDate(currentDate.getDate() + days);
  renderDate();
}

// ======= TASK =======
function getTasks() {
  return JSON.parse(localStorage.getItem(formatDate(currentDate))) || [];
}

function saveTasks(tasks) {
  localStorage.setItem(formatDate(currentDate), JSON.stringify(tasks));
}

function renderTasks() {
  const list = document.getElementById("taskList");
  list.innerHTML = "";

  const tasks = getTasks();

  tasks.forEach((task, index) => {
    const li = document.createElement("li");
    li.innerHTML = `
      ${task}
      <span class="delete" onclick="deleteTask(${index})">❌</span>
    `;
    list.appendChild(li);
  });
}

function addTask() {
  const input = document.getElementById("taskInput");
  const value = input.value.trim();
  if (!value) return;

  const tasks = getTasks();
  tasks.push(value);
  saveTasks(tasks);

  input.value = "";
  renderTasks();
}

function deleteTask(index) {
  const tasks = getTasks();
  tasks.splice(index, 1);
  saveTasks(tasks);
  renderTasks();
}

// ===== INIT =====
setBackground();
renderDate();
</script>

</body>
</html>
