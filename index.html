<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Lịch Dashboard PRO</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  display: flex;
  height: 100vh;
  background: linear-gradient(135deg,#1e3c72,#2a5298);
  color: white;
}

.wrapper {
  display: flex;
  width: 100%;
  padding: 20px;
  gap: 20px;
}

/* LEFT */
.left {
  width: 420px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(20px);
  padding: 20px;
  border-radius: 16px;
}

/* RIGHT */
.right {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.card {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(15px);
  padding: 15px;
  border-radius: 16px;
}

h2,h3 {text-align:center;margin:5px 0;}

button {
  padding:6px 10px;
  border:none;
  border-radius:8px;
  background:rgba(255,255,255,0.2);
  color:white;
  cursor:pointer;
}

input {padding:6px;margin:3px;border-radius:6px;border:none;}

ul {list-style:none;padding:0;}

li {
  background:rgba(255,255,255,0.2);
  margin:5px 0;
  padding:8px;
  display:flex;
  justify-content:space-between;
}

/* CALENDAR */
.calendar {
  display:grid;
  grid-template-columns: repeat(7,1fr);
  gap:5px;
  text-align:center;
}

.day {
  padding:8px;
  background:rgba(255,255,255,0.2);
  border-radius:6px;
}

.today {
  background:#ff4081;
}

/* ===== WEATHER IPHONE STYLE ===== */
.weather-city {
  text-align:center;
  font-size:18px;
  margin-bottom:5px;
}

.weather-main {
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
}

#weatherTemp {
  font-size:42px;
  font-weight:bold;
}

#weatherIcon {
  font-size:36px;
}

#weatherDesc {
  text-align:center;
  margin-top:5px;
}

.weather-extra {
  text-align:center;
  margin-top:5px;
}

.forecast {
  margin-top:10px;
  display:flex;
  justify-content:space-between;
  font-size:12px;
}

.forecast div {
  text-align:center;
}

/* toggle spacing */
.toggle-btn {
  width: 100%;
  margin-top: 20px;
  margin-bottom: 10px;
  background: rgba(33,150,243,0.8);
}
</style>
</head>

<body>

<div class="wrapper">

<div class="left">

<h2 id="solar"></h2>
<h3 id="lunar"></h3>

<div style="display:flex;justify-content:space-between;">
<button onclick="changeDate(-1)">⬅</button>
<button onclick="changeDate(1)">➡</button>
</div>

<div>
<input type="text" id="taskInput" placeholder="Nhập công việc...">
<button onclick="addTask()">Thêm</button>
</div>

<ul id="taskList"></ul>

<!-- 🌤️ WEATHER FULL IPHONE -->
<div class="card">

<div class="weather-city" id="weatherCity"></div>

<div class="weather-main">
  <div id="weatherTemp">--°</div>
  <div id="weatherIcon">☀️</div>
</div>

<div id="weatherDesc">---</div>

<div class="weather-extra">
  <span id="weatherWind">💨 --</span>
</div>

<div class="forecast" id="forecast"></div>

</div>

<button class="toggle-btn" onclick="toggleMode()" id="modeBtn">
Tra cứu dương → âm
</button>

<div id="solarMode">
<input type="date" id="datePicker">
<h3 id="resultLunar"></h3>
</div>

<div id="lunarMode" style="display:none;">
<input id="lDay">
<input id="lMonth">
<input id="lYear">
</div>

</div>

<div class="right">

<div class="card">
<h3>📅 Lịch tháng</h3>
<div id="calendar" class="calendar"></div>
</div>

<div class="card">
<h3>📊 Thống kê</h3>
<p id="taskCount"></p>
</div>

<div class="card">
<h3>📝 Ghi chú</h3>
<textarea style="width:100%;height:80px;"></textarea>
</div>

</div>

</div>

<script>
let currentDate = new Date();
let isSolarMode = true;

/* TIME */
function updateTime(){
  solar.innerText = new Date().toLocaleTimeString("vi-VN") + " - " +
  currentDate.toLocaleDateString("vi-VN",{weekday:'long',year:'numeric',month:'long',day:'numeric'});
}

/* LUNAR */
function convertSolar2Lunar(d,m,y){
  return {day:d,month:m,year:y};
}

/* RENDER */
function render(){
  updateTime();

  const lunarDate = convertSolar2Lunar(
    currentDate.getDate(),
    currentDate.getMonth()+1,
    currentDate.getFullYear()
  );

  lunar.innerText = `Âm: ${lunarDate.day}/${lunarDate.month}/${lunarDate.year}`;

  renderTasks();
  renderCalendar();
}

/* CALENDAR */
function renderCalendar(){
  const cal = document.getElementById("calendar");
  cal.innerHTML = "";

  const year = currentDate.getFullYear();
  const month = currentDate.getMonth();
  const lastDay = new Date(year, month+1, 0).getDate();

  for(let i=1;i<=lastDay;i++){
    const div = document.createElement("div");
    div.className = "day";
    if(i === currentDate.getDate()) div.classList.add("today");
    div.innerText = i;
    cal.appendChild(div);
  }
}

/* TASK */
function formatDate(d){return d.toISOString().split('T')[0];}
function getTasks(){return JSON.parse(localStorage.getItem(formatDate(currentDate)))||[];}
function saveTasks(t){localStorage.setItem(formatDate(currentDate),JSON.stringify(t));}

function renderTasks(){
  const list = getTasks();
  taskList.innerHTML="";
  list.forEach((t,i)=>{
    taskList.innerHTML+=`<li>${t}<span onclick="deleteTask(${i})">❌</span></li>`;
  });
  taskCount.innerText = "Tổng công việc: " + list.length;
}

function addTask(){
  if(!taskInput.value.trim())return;
  let t = getTasks();
  t.push(taskInput.value);
  saveTasks(t);
  taskInput.value="";
  renderTasks();
}

function deleteTask(i){
  let t=getTasks();
  t.splice(i,1);
  saveTasks(t);
  renderTasks();
}

/* TOGGLE */
function toggleMode(){
  isSolarMode = !isSolarMode;
  solarMode.style.display = isSolarMode?"block":"none";
  lunarMode.style.display = isSolarMode?"none":"block";
}

/* CHANGE DATE */
function changeDate(d){
  currentDate.setDate(currentDate.getDate()+d);
  render();
}

/* ===== WEATHER IPHONE ===== */
function getIcon(code){
  if(code===0) return "☀️";
  if(code<=3) return "⛅";
  if(code<=48) return "☁️";
  if(code<=67) return "🌧️";
  return "⛈️";
}

function getDesc(code){
  if(code===0) return "Trời quang";
  if(code<=3) return "Ít mây";
  if(code<=48) return "Nhiều mây";
  if(code<=67) return "Mưa";
  return "Giông";
}

function loadWeather(lat, lon){

fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&daily=temperature_2m_max,temperature_2m_min&timezone=auto`)
.then(res=>res.json())
.then(data=>{
  const w=data.current_weather;

  weatherTemp.innerText=w.temperature+"°";
  weatherIcon.innerText=getIcon(w.weathercode);
  weatherDesc.innerText=getDesc(w.weathercode);
  weatherWind.innerText="💨 "+w.windspeed+" km/h";

  let html="";
  for(let i=0;i<7;i++){
    html+=`<div>
      <div>${new Date(data.daily.time[i]).toLocaleDateString("vi-VN",{weekday:'short'})}</div>
      <div>${Math.round(data.daily.temperature_2m_max[i])}°</div>
      <div>${Math.round(data.daily.temperature_2m_min[i])}°</div>
    </div>`;
  }
  forecast.innerHTML=html;
});

fetch(`https://geocode.maps.co/reverse?lat=${lat}&lon=${lon}`)
.then(res=>res.json())
.then(data=>{
  weatherCity.innerText =
    data.address.city ||
    data.address.town ||
    data.address.country;
});

}

navigator.geolocation.getCurrentPosition(pos=>{
  loadWeather(pos.coords.latitude,pos.coords.longitude);
});

/* INIT */
setInterval(updateTime,1000);
render();
</script>

</body>
</html>
